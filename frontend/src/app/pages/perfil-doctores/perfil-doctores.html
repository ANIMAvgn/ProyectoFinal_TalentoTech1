<div class="profile-page">

  <div class="profile-header">

    <div class="avatar">
      <img src="https://randomuser.me/api/portraits/men/32.jpg">
    </div>

    <div class="profile-main">

      <h2>Dr. Juan Díaz</h2>

      <p class="role">Psicólogo clínico</p>

      <button 
        class="btn btn-light btn-sm mt-2"
        (click)="logout()"
      >
        Cerrar sesión
      </button>

    </div>

  </div>


  <div class="profile-content">

    <!-- INFORMACIÓN -->
    <div class="card profile-card">

      <h4>Información profesional</h4>

      <div class="info-grid">

        <div>
          <label>Especialidad</label>
          <p>Psicología clínica</p>
        </div>

        <div>
          <label>Experiencia</label>
          <p>5 años</p>
        </div>

        <div>
          <label>Ciudad</label>
          <p>Medellín</p>
        </div>

        <div>
          <label>Email</label>
          <p>juandiaz@email.com</p>
        </div>

        <div>
          <label>Consultorio</label>
          <p>PRISMA Psicología</p>
        </div>

      </div>

    </div>


    <!-- DISPONIBILIDAD -->
    <div class="card profile-card">

      <h4>Disponibilidad</h4>

      <div class="admin-actions">

        <div class="admin-item">
          Lunes 8:00 AM - 12:00 PM
        </div>

        <div class="admin-item">
          Miércoles 2:00 PM - 6:00 PM
        </div>

        <div class="admin-item">
          Viernes 9:00 AM - 1:00 PM
        </div>

      </div>

    </div>


    <!-- PACIENTES -->
    <div class="card profile-card">

      <h4>Pacientes asignados</h4>

      <div class="experience">

        <div class="experience-item">

          <div class="experience-circle">AM</div>

          <div>
            <div class="text-primary fs-5">Ana Martínez</div>
            <div class="text-muted">Consulta próxima: 20 Abril</div>
          </div>

        </div>

      </div>

    </div>

  </div>

</div>
