<div class="container mt-5" style="max-width:400px">

  <form (ngSubmit)="login()">

    <h3 class="mb-4 text-center">Login</h3>

    <input
      type="email"
      class="form-control mb-3"
      placeholder="Email"
      name="email"
      [(ngModel)]="email"
      required
    >

    <input
      type="password"
      class="form-control mb-3"
      placeholder="Password"
      name="password"
      [(ngModel)]="password"
      required
    >

    <button
      type="submit"
      class="btn btn-dark w-100"
    >
      Login
    </button>

  </form>

</div>
