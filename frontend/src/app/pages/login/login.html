<div class="container mt-5" style="max-width:400px">

  <h3>Login</h3>

  <input
  class="form-control mb-3"
  placeholder="Email"
  [(ngModel)]="email">

  <input
  type="password"
  class="form-control mb-3"
  placeholder="Password"
  [(ngModel)]="password">

  <button
  class="btn btn-dark w-100"
  (click)="login()">

  Login

  </button>

</div>
