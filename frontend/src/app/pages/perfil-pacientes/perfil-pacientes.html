<div class="profile-page">

  <div class="profile-header">

    <div class="avatar">
      <img src="https://randomuser.me/api/portraits/women/44.jpg">
    </div>

    <div class="profile-main">

      <h2>Ana Martínez</h2>

      <p class="role">Paciente</p>

      <button 
        class="btn btn-light btn-sm mt-2"
        (click)="logout()"
      >
        Cerrar sesión
      </button>

    </div>

  </div>


  <div class="profile-content">

    <!-- INFORMACIÓN -->
    <div class="card profile-card">

      <h4>Información personal</h4>

      <div class="info-grid">

        <div>
          <label>Tipo documento</label>
          <p>CC</p>
        </div>

        <div>
          <label>Número documento</label>
          <p>1045567890</p>
        </div>

        <div>
          <label>Celular</label>
          <p>3104567890</p>
        </div>

        <div>
          <label>Ciudad</label>
          <p>Medellín</p>
        </div>

        <div>
          <label>Email</label>
          <p>ana@email.com</p>
        </div>

      </div>

    </div>


    <!-- CITAS -->
    <div class="card profile-card">

      <h4>Próximas citas</h4>

      <div class="experience">

        <div class="experience-item">

          <div class="experience-circle">PS</div>

          <div>
            <div class="text-primary fs-5">Consulta psicológica</div>
            <div>Dr. Juan Díaz</div>
            <div class="text-muted">20 Abril 2026 - 3:00 PM</div>
          </div>

        </div>

      </div>

    </div>


    <!-- HISTORIAL -->
    <div class="card profile-card">

      <h4>Historial de consultas</h4>

      <p class="text-muted">
        Aquí podrás revisar las consultas psicológicas realizadas anteriormente.
      </p>

    </div>

  </div>

</div>
