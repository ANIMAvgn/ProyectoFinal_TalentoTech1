spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/prisma_psicologia
    username: postgres
    password: 1234

  security:
    user:
      name: admin
      password: 1234

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8081
  error:
    include-message: always
  
  